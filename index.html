<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool VJP26 - Chuyên Gia CNC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Work+Sans:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined|Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/fonts/fonts.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f1419;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a2332;
        }

        ::-webkit-scrollbar-thumb {
            background: #3f4d63;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #556b82;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Hiệu ứng Scanline */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* Glitch text effect */
        .glitch-text {
            position: relative;
            display: inline-block;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020617;
        }

        .glitch-text::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1;
            animation: glitch-anim2 1s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% {
                clip: rect(31px, 9999px, 94px, 0);
                transform: skew(0.85deg);
            }

            100% {
                clip: rect(67px, 9999px, 62px, 0);
                transform: skew(0.13deg);
            }
        }

        @keyframes glitch-anim2 {
            0% {
                clip: rect(10px, 9999px, 30px, 0);
            }

            100% {
                clip: rect(40px, 9999px, 90px, 0);
            }
        }

        /* Custom scrollbar for elements */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #a855f7, #3b82f6);
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #c084fc, #60a5fa);
        }

        /* ============ Toolbar Button Animations ============ */
        .toolbar-button {
            transition: all 0.3s ease;
            position: relative;
        }

        .toolbar-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }

        .toolbar-button-icon {
            transition: all 0.3s ease;
            display: inline-block;
        }

        .toolbar-button:hover .toolbar-button-icon {
            transform: scale(1.15);
        }

        .toolbar-button:active {
            transform: scale(0.95) translateY(0);
        }

        .toolbar-button:active .toolbar-button-icon {
            transform: scale(0.95);
        }

        /* ============ ANIMATED SVG ICON STYLES ============ */
        
        /* New Nest List - Notepads spreading */
        .nesting-icon .notepad-group {
            transform-origin: center;
            transition: transform 0.3s ease;
        }
        .nesting-icon .notepad-group-2 {
            transform-origin: center;
            transition: transform 0.3s ease;
        }
        button:hover .nesting-icon .notepad-group {
            transform: rotate(-15deg) translateX(-3px);
        }
        button:hover .nesting-icon .notepad-group-2 {
            transform: rotate(15deg) translateX(3px);
        }

        /* Part Library - Stack rotating */
        .library-icon .box-stack {
            transform-origin: center;
            transition: transform 0.3s ease;
        }
        button:hover .library-icon .box-stack {
            transform: rotateY(15deg);
        }
        .library-icon .box-1, .library-icon .box-2, .library-icon .box-3 {
            transition: transform 0.3s ease;
        }
        button:hover .library-icon .box-1 {
            transform: translateY(-2px);
        }
        button:hover .library-icon .box-2 {
            transform: translateY(0px) scale(1.05);
        }
        button:hover .library-icon .box-3 {
            transform: translateY(2px);
        }

        /* Nest Parts - Shapes rotating */
        .nest-icon .nest-shapes {
            transform-origin: center;
            transition: transform 0.3s ease;
        }
        button:hover .nest-icon .nest-shapes {
            transform: rotate(20deg);
        }
        .nest-icon .nest-outer, .nest-icon .nest-inner {
            transition: transform 0.3s ease;
            transform-origin: center;
        }
        button:hover .nest-icon .nest-outer {
            transform: scale(1.1);
        }
        button:hover .nest-icon .nest-inner {
            transform: scale(0.9);
        }

        /* Manual Nest - Hand spreading fingers */
        .manual-icon .fingers {
            transition: transform 0.3s ease;
            transform-origin: center;
        }
        button:hover .manual-icon .fingers {
            transform: scaleY(1.15);
        }
        .manual-icon .palm {
            transition: transform 0.3s ease;
        }
        button:hover .manual-icon .palm {
            transform: scaleX(1.1);
        }

        /* Nesting Info - Rings expanding */
        .info-icon .info-ring-1 {
            transition: transform 0.3s ease;
            transform-origin: center;
        }
        .info-icon .info-ring-2 {
            transition: transform 0.3s ease;
            transform-origin: center;
        }
        button:hover .info-icon .info-ring-1 {
            transform: scale(1.15);
        }
        button:hover .info-icon .info-ring-2 {
            transform: scale(0.85);
        }

        /* Save Off-Cut - Drawer sliding */
        .save-icon .disk-drawer {
            transition: transform 0.3s ease;
            transform-origin: center;
        }
        button:hover .save-icon .disk-drawer {
            transform: translateY(3px);
        }
        .save-icon .disk-body {
            transition: transform 0.3s ease;
        }
        button:hover .save-icon .disk-body {
            transform: translateY(-2px);
        }

        /* Import Project - Arrow moving */
        .import-icon .arrow-stem, .import-icon .arrow-head {
            transition: transform 0.3s ease;
        }
        button:hover .import-icon .arrow-stem {
            transform: translateY(2px);
        }
        button:hover .import-icon .arrow-head {
            transform: translateY(2px) scale(1.1);
        }

        /* Export Project - Arrow moving */
        .export-icon .arrow-stem, .export-icon .arrow-head {
            transition: transform 0.3s ease;
        }
        button:hover .export-icon .arrow-stem {
            transform: translateY(-2px);
        }
        button:hover .export-icon .arrow-head {
            transform: translateY(-2px) scale(1.1);
        }

        /* Import DXF - File rotating slightly */
        .import-dxf-icon .file-outline {
            transition: transform 0.3s ease;
            transform-origin: center;
        }
        button:hover .import-dxf-icon .file-outline {
            transform: rotate(5deg);
        }
        .import-dxf-icon .dxf-circle {
            transition: transform 0.3s ease;
            transform-origin: center;
        }
        button:hover .import-dxf-icon .dxf-circle {
            transform: scale(1.2);
        }

        /* Sheet Database - Sheets spreading */
        .database-icon .sheet-1, .database-icon .sheet-2, .database-icon .sheet-3 {
            transition: transform 0.3s ease;
            transform-origin: center;
        }
        button:hover .database-icon .sheet-1 {
            transform: translateY(-3px) rotate(-8deg);
        }
        button:hover .database-icon .sheet-2 {
            transform: translateY(0px);
        }
        button:hover .database-icon .sheet-3 {
            transform: translateY(3px) rotate(8deg);
        }

        /* Layers - Layering animation */
        .layers-icon .layer-1, .layers-icon .layer-2 {
            transition: transform 0.3s ease;
            transform-origin: center;
        }
        button:hover .layers-icon .layer-1 {
            transform: scaleZ(1.1);
        }
        button:hover .layers-icon .layer-2 {
            transform: scaleZ(1.2);
        }

        /* Undo - Arc rotating */
        .undo-icon .undo-arc, .undo-icon .undo-arrow {
            transition: transform 0.3s ease;
            transform-origin: center;
        }
        button:hover .undo-icon .undo-arc {
            transform: rotate(-30deg);
        }
        button:hover .undo-icon .undo-arrow {
            transform: rotate(-30deg);
        }

        /* Redo - Arc rotating */
        .redo-icon .redo-arc, .redo-icon .redo-arrow {
            transition: transform 0.3s ease;
            transform-origin: center;
        }
        button:hover .redo-icon .redo-arc {
            transform: rotate(30deg);
        }
        button:hover .redo-icon .redo-arrow {
            transform: rotate(30deg);
        }

        /* Fullscreen - Corners expanding */
        .fullscreen-icon .corner-tl, .fullscreen-icon .corner-tr, 
        .fullscreen-icon .corner-bl, .fullscreen-icon .corner-br {
            transition: transform 0.3s ease;
        }
        button:hover .fullscreen-icon .corner-tl {
            transform: translate(-2px, -2px);
        }
        button:hover .fullscreen-icon .corner-tr {
            transform: translate(2px, -2px);
        }
        button:hover .fullscreen-icon .corner-bl {
            transform: translate(-2px, 2px);
        }
        button:hover .fullscreen-icon .corner-br {
            transform: translate(2px, 2px);
        }

        /* Export DXF - File with arrow */
        .export-dxf-icon .file-outline {
            transition: transform 0.3s ease;
            transform-origin: center;
        }
        .export-dxf-icon .arrow-up, .export-dxf-icon .arrow-head {
            transition: transform 0.3s ease;
        }
        button:hover .export-dxf-icon .file-outline {
            transform: rotate(-5deg);
        }
        button:hover .export-dxf-icon .arrow-up {
            transform: translateY(-3px);
        }
        button:hover .export-dxf-icon .arrow-head {
            transform: translateY(-3px) scale(1.15);
        }

        /* Export PDF - File expanding */
        .export-pdf-icon .file-outline {
            transition: transform 0.3s ease;
            transform-origin: center;
        }
        button:hover .export-pdf-icon .file-outline {
            transform: scale(1.1);
        }
        .export-pdf-icon .pdf-label {
            transition: transform 0.3s ease;
            transform-origin: center;
        }
        button:hover .export-pdf-icon .pdf-label {
            transform: scale(1.15);
        }
        /* ============ NEON TUBE GLOW EFFECT ============ */
        button:hover .nesting-icon svg,
        button:hover .library-icon svg,
        button:hover .nest-icon svg,
        button:hover .manual-icon svg,
        button:hover .info-icon svg,
        button:hover .save-icon svg,
        button:hover .import-icon svg,
        button:hover .export-icon svg,
        button:hover .import-dxf-icon svg,
        button:hover .database-icon svg,
        button:hover .layers-icon svg,
        button:hover .undo-icon svg,
        button:hover .redo-icon svg,
        button:hover .fullscreen-icon svg,
        button:hover .export-dxf-icon svg,
        button:hover .export-pdf-icon svg {
            --blur: 2rem;
            --glow: rgba(6, 182, 212, 1);
            filter: 
                /* inside glow */ drop-shadow(inset 0 0 calc(0.5 * var(--blur)) var(--glow)),
                /* outside glow */ drop-shadow(0 0 var(--blur) var(--glow)),
                /* brightness boost */ brightness(1.3);
            text-shadow: 0 0 var(--blur) var(--glow);
            animation: neon-pulse 1.5s ease-in-out infinite;
            transition: all 0.3s ease;
        }

        /* ============ NEON PULSE ANIMATION ============ */
        @keyframes neon-pulse {
            0% {
                --glow: rgba(6, 182, 212, 0.6);
                filter: 
                    drop-shadow(inset 0 0 calc(0.5 * var(--blur)) var(--glow)),
                    drop-shadow(0 0 var(--blur) var(--glow)),
                    brightness(1.1);
            }
            50% {
                --glow: rgba(6, 182, 212, 1);
                filter: 
                    drop-shadow(inset 0 0 calc(0.5 * var(--blur)) var(--glow)),
                    drop-shadow(0 0 var(--blur) var(--glow)),
                    brightness(1.4);
            }
            100% {
                --glow: rgba(6, 182, 212, 0.6);
                filter: 
                    drop-shadow(inset 0 0 calc(0.5 * var(--blur)) var(--glow)),
                    drop-shadow(0 0 var(--blur) var(--glow)),
                    brightness(1.1);
            }
        }
    </style>
